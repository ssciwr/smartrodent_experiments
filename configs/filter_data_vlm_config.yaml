backend: vllm # "vllm" (fast, batched, local GPU) or "ollama" (fallback)

paths:
  imgs_root: /home/hmack/Development/rodent_experiments/datasets/biotrove-central-europe/raw
  image_suffixes: [.jpg, .jpeg, .png]

ollama:
  url: http://localhost:11434/api/generate
  model: qwen3.6:35b-a3b
  # model: qwen3-vl:8b

vllm:
  model: Qwen/Qwen2.5-VL-3B-Instruct
  # model:  Qwen/Qwen3.6-35B-A3B
  gpu_memory_utilization: 0.7
  max_model_len: 8192
  max_new_tokens: 300
  batch_size: 64

system_prompt: |
  You are a meticulous wildlife biologist and camera-trap image analyst. You
  have extensive experience reviewing motion-triggered wildlife camera
  photos and know their common artifacts: motion blur, infrared/night-vision
  grain, partial occlusion by vegetation, and false triggers. You only
  report evidence you can actually see in the image and never guess.

prompt: |
  You are classifying wildlife images.

  Return ONLY valid JSON with this exact schema:

  {
    "label": "alive | dead | unsure",
    "visible_animal": true,
    "evidence_alive": ["string"],
    "evidence_dead": ["string"],
    "image_quality": "clear | poor | unusable",
    "needs_human_review": true
  }

  Rules:
  - label must be exactly one of: "alive", "dead", "unsure".
  - Use "dead" only for clear evidence of death: carcass, roadkill, skull, bones,
    preserved specimen, visibly dead body.
  - Use "alive" only if a live animal is clearly visible.
  - Use "unsure" if no animal is visible, the image is ambiguous, cropped, low
    quality, a drawing, or you cannot confidently decide.
  - needs_human_review should be true for unsure, poor/unusable images, or conflicting
    evidence.
  - Do not include markdown.
  - Do not include text outside the JSON object.
