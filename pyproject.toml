[project]
name = "rodent-experiments"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "datasets>=5.0.0",
    "hf-datasets>=0.3.0",
    "matplotlib>=3.11.0",
    "numpy>=2.4.6",
    "polars>=1.41.2",
    "pyaml>=26.2.1",
    "speciesnet>=1.0",
    "ultralytics>=8.4.68",
    "torch",
    "torchvision",
    "pyaml",
    "open-clip-torch>=3.3.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-cov", "coverage", "pre-commit", "pytest-mock"]

[tool.coverage.run]
branch = true
source = ["./src/smartrodent"]

[tool.coverage.report]
# Regexes for lines to exclude from consideration
exclude_also = [
    # Don't complain about missing debug-only code:
    "def __repr__",
    "if self\\.debug",

    # Don't complain if non-runnable code isn't run:
    "if __name__ == .__main__.:",

    # Don't complain about abstract methods, they aren't run:
    "@(abc\\.)?abstractmethod",
]
fail_under = 80

[tool.coverage.html]
directory = "coverage_html_report"
